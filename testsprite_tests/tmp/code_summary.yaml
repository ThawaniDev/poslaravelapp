      - { method: POST,   path: "/api/v2/catalog/products/{id}/barcode", description: "Generate barcode.", auth_required: true }
      - { method: GET,    path: "/api/v2/catalog/products/{id}/variants", description: "List variants.", auth_required: true }
      - { method: POST,   path: "/api/v2/catalog/products/{id}/variants/sync", description: "Sync variants array.", auth_required: true }
      - { method: GET,    path: "/api/v2/catalog/products/{id}/modifiers", description: "List modifier groups.", auth_required: true }
      - { method: POST,   path: "/api/v2/catalog/products/{id}/modifiers/sync", description: "Sync modifier attachments.", auth_required: true }
      - { method: GET,    path: "/api/v2/catalog/categories", description: "Category tree.", auth_required: true }
      - { method: POST,   path: "/api/v2/catalog/categories", description: "Create category {name,parent_id?}.", auth_required: true }
      - { method: GET,    path: "/api/v2/catalog/categories/{id}", description: "Show category.", auth_required: true }
      - { method: PUT,    path: "/api/v2/catalog/categories/{id}", description: "Update category.", auth_required: true }
      - { method: DELETE, path: "/api/v2/catalog/categories/{id}", description: "Delete category.", auth_required: true }
      - { method: GET,    path: "/api/v2/catalog/suppliers", description: "List suppliers.", auth_required: true }
      - { method: POST,   path: "/api/v2/catalog/suppliers", description: "Create supplier.", auth_required: true }
      - { method: GET,    path: "/api/v2/catalog/suppliers/{id}", description: "Show supplier.", auth_required: true }
      - { method: PUT,    path: "/api/v2/catalog/suppliers/{id}", description: "Update supplier.", auth_required: true }
      - { method: DELETE, path: "/api/v2/catalog/suppliers/{id}", description: "Delete supplier.", auth_required: true }

