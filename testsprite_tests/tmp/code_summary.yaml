version: "2"
type: backend
tech_stack:
  - PHP 8.2
  - Laravel 12
  - Laravel Sanctum
  - Filament 3
  - Spatie Permission / Activity Log / Media Library / Backup
  - Laravel Horizon
  - PostgreSQL 15 (Supabase compatible)
  - Redis
  - Firebase (FCM)
  - PayTabs / Thawani
  - ZATCA
  - PHPUnit 11

base_url: http://localhost:8000
api_prefix: /api/v2

# AUTH GUIDANCE FOR TESTSPRITE
# All protected endpoints require: Authorization: Bearer <token>
# Token comes from POST /api/v2/auth/login -> response.data.token
# All responses use envelope: { success: bool, message: string, data: object|array, errors?: object }
#
# SEEDED CREDENTIALS (already in DB):
#   owner@testsprite.local      / Password123!  PIN 1111  Owner
#   manager@testsprite.local    / Password123!  PIN 2222  BranchManager
#   cashier@testsprite.local    / Password123!  PIN 3333  Cashier
#   inventory@testsprite.local  / Password123!  PIN 4444  InventoryClerk
#   accountant@testsprite.local / Password123!  PIN 5555  Accountant

global_response_envelope:
  success: boolean
  message: string
  data: object|array|null
  errors: object|null

features:

  - name: Authentication
    description: Login (email+password and PIN), registration, OTP, profile, token refresh, logout, multi-device session control via Sanctum.
    files: [routes/api/auth.php, app/Http/Controllers/Api/Auth/LoginController.php, app/Http/Controllers/Api/Auth/RegisterController.php, app/Http/Controllers/Api/Auth/OtpController.php, app/Http/Controllers/Api/Auth/ProfileController.php]
    endpoints:
      - { method: POST, path: "/api/v2/auth/login", description: "Login with email+password. Body {email,password}. Returns 200 + data.token on success, 401 on bad creds, 422 on validation error.", auth_required: false }
      - { method: POST, path: "/api/v2/auth/login/pin", description: "PIN login. Body {email,pin}. Returns token.", auth_required: false }
      - { method: POST, path: "/api/v2/auth/logout", description: "Revoke current token.", auth_required: true }
      - { method: POST, path: "/api/v2/auth/logout-all", description: "Revoke all user tokens.", auth_required: true }
      - { method: POST, path: "/api/v2/auth/register", description: "Register new account. Body {email,password,phone,organization_name,country}. 201 success, 422 duplicate.", auth_required: false }
      - { method: POST, path: "/api/v2/auth/otp/send", description: "Send OTP to phone/email.", auth_required: false }
      - { method: POST, path: "/api/v2/auth/otp/verify", description: "Verify OTP code.", auth_required: false }
      - { method: GET,  path: "/api/v2/auth/me", description: "Current user. 200 with user object, 401 without token.", auth_required: true }
      - { method: PUT,  path: "/api/v2/auth/profile", description: "Update name/phone/locale.", auth_required: true }
      - { method: PUT,  path: "/api/v2/auth/password", description: "Change password. Body {current_password,new_password}.", auth_required: true }
      - { method: PUT,  path: "/api/v2/auth/pin", description: "Change PIN.", auth_required: true }
      - { method: POST, path: "/api/v2/auth/refresh", description: "Rotate access token.", auth_required: true }

  - name: Core - Stores and Onboarding
    description: Store CRUD, settings, working hours, business types, onboarding wizard.
    files: [routes/api/core.php, routes/api/onboarding.php]
    endpoints:
      - { method: GET,  path: "/api/v2/core/stores/mine", description: "Stores in current org.", auth_required: true }
      - { method: GET,  path: "/api/v2/core/stores", description: "List stores.", auth_required: true }
      - { method: GET,  path: "/api/v2/core/stores/{id}", description: "Show store.", auth_required: true }
      - { method: PUT,  path: "/api/v2/core/stores/{id}", description: "Update store.", auth_required: true }
      - { method: GET,  path: "/api/v2/core/stores/{id}/settings", description: "Get store settings.", auth_required: true }
      - { method: PUT,  path: "/api/v2/core/stores/{id}/settings", description: "Update store settings.", auth_required: true }
      - { method: GET,  path: "/api/v2/core/stores/{id}/working-hours", description: "Get working hours.", auth_required: true }
      - { method: PUT,  path: "/api/v2/core/stores/{id}/working-hours", description: "Update working hours.", auth_required: true }
      - { method: GET,  path: "/api/v2/core/business-types", description: "List business types (grocery|restaurant|pharmacy|bakery|electronics|florist|jewelry|fashion).", auth_required: true }
      - { method: POST, path: "/api/v2/core/stores/{id}/business-type", description: "Apply business type template.", auth_required: true }
      - { method: GET,  path: "/api/v2/core/onboarding/steps", description: "List onboarding steps.", auth_required: true }
      - { method: GET,  path: "/api/v2/core/onboarding/progress", description: "Get progress.", auth_required: true }
      - { method: POST, path: "/api/v2/core/onboarding/complete-step", description: "Mark step complete.", auth_required: true }
      - { method: POST, path: "/api/v2/core/onboarding/skip", description: "Skip wizard.", auth_required: true }
      - { method: POST, path: "/api/v2/core/onboarding/checklist", description: "Update checklist.", auth_required: true }
      - { method: POST, path: "/api/v2/core/onboarding/dismiss-checklist", description: "Dismiss checklist.", auth_required: true }
      - { method: POST, path: "/api/v2/core/onboarding/reset", description: "Reset onboarding.", auth_required: true }

