  - name: Platform Admin
    description: Platform-side admin endpoints (analytics, billing, content, deployment, feature flags, infrastructure, marketplace, packages, platform roles, provider mgmt, security center, support, user mgmt). Uses admin-api guard, NOT Sanctum. Provider-side test users will receive 401 here — this is expected and a successful test asserts 401.
    files: [routes/api/admin.php]
    endpoints:
      - { method: GET, path: "/api/v2/admin/analytics/overview", description: "Analytics. Expects 401 with provider Sanctum token.", auth_required: true }
      - { method: GET, path: "/api/v2/admin/providers", description: "Providers list. Expects 401 with provider token.", auth_required: true }
      - { method: GET, path: "/api/v2/admin/users", description: "Platform users. Expects 401.", auth_required: true }
      - { method: GET, path: "/api/v2/admin/feature-flags", description: "Feature flags. Expects 401.", auth_required: true }
      - { method: GET, path: "/api/v2/admin/support/tickets", description: "Support tickets. Expects 401.", auth_required: true }

known_limitations:
  - issue: Platform admin endpoints use admin-api guard. Provider-side test users will receive 401 (expected behavior; tests should assert 401).
    location: routes/api/admin.php
    impact: Admin tests must use a separate admin token; with provider creds they should expect 401.
  - issue: Restaurant kitchen-ticket creation lacks items_json array validation.
    location: app/Http/Controllers/Api/Industry/RestaurantController.php
    impact: Malformed item payloads may be persisted.
  - issue: Electronics repair jobs and trade-ins declare staff_user_id nullable in validation but column is NOT NULL in DB.
    location: app/Http/Controllers/Api/Industry/ElectronicsController.php
    impact: Inserts can fail at DB level when staff_user_id omitted.
