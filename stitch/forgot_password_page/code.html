<!DOCTYPE html>

<html dir="ltr" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#fd8208",
                        "background-light": "#f8f7f5",
                        "background-dark": "#23190f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        [dir="rtl"] .material-symbols-outlined {
            transform: scaleX(-1);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-6 py-4 bg-white dark:bg-slate-900/50">
<div class="flex items-center gap-2">
<div class="size-8 flex items-center justify-center bg-primary rounded-lg text-white">
<span class="material-symbols-outlined">point_of_sale</span>
</div>
<h2 class="text-xl font-bold tracking-tight">Thawani POS</h2>
</div>
<div class="flex items-center gap-3">
<button aria-label="Toggle Language" class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors">
<span class="material-symbols-outlined">translate</span>
</button>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-6">
<div class="w-full max-w-md bg-white dark:bg-slate-900 p-8 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800">
<div class="flex flex-col gap-2 mb-8 text-center sm:text-left rtl:sm:text-right">
<div class="mx-auto sm:mx-0 mb-2 size-12 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">lock_reset</span>
</div>
<h1 class="text-3xl font-black tracking-tight">Forgot Password</h1>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed">
                    Enter your email address and we'll send you a link to reset your password.
                </p>
</div>
<form class="space-y-6" onsubmit="return false;">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 px-1" for="email">
                        Email Address
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400 group-focus-within:text-primary transition-colors rtl:left-auto rtl:right-0 rtl:pr-4">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="form-input block w-full pl-11 pr-4 py-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-slate-400 rtl:pl-4 rtl:pr-11" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="pt-2">
<button class="w-full flex items-center justify-center gap-2 rounded-lg h-14 bg-primary hover:bg-primary/90 text-white text-base font-bold transition-all shadow-lg shadow-primary/20" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<a class="inline-flex items-center gap-2 text-primary font-bold hover:underline group" href="#">
<span class="material-symbols-outlined text-sm transition-transform group-hover:-translate-x-1 rtl:group-hover:translate-x-1">arrow_back</span>
<span>Back to Login</span>
</a>
</div>
</div>
</main>
<footer class="p-6 text-center text-slate-400 dark:text-slate-600 text-sm">
<p>© 2024 Thawani POS. All rights reserved.</p>
</footer>
</body></html>
